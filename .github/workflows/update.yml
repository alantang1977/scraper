name: Daily IPTV Scrape

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许写仓库
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false  # 必须关闭，才能用自己的TOKEN

      - name: Checkout iptv-validator
        uses: actions/checkout@v4
        with:
          repository: xJEYDAin/iptv-validator
          path: iptv-validator
          fetch-depth: 1

      - name: Copy validation cache
        run: |
          mkdir -p cache
          if [ -f iptv-validator/cache/validation_cache.json ]; then
            cp iptv-validator/cache/validation_cache.json cache/validation_cache.json
            echo "✓ 使用缓存"
          else
            echo "⚠ 无缓存"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Create dirs
        run: mkdir -p cache logs sources filtered output

      - name: Run scraper
        run: SKIP_VALIDATION=1 python main.py

      - name: Cleanup old files
        run: |
          find logs/ -name "*.log" -mtime +3 -delete 2>/dev/null || true
          for src in $(ls filtered/*.m3u* 2>/dev/null | sed 's/.*\///' | sed 's/_[0-9]*\.m3u.*//' | sort -u); do
            files=$(ls -t filtered/${src}_*.m3u* 2>/dev/null | tail -n +2)
            for f in $files; do rm -f "$f"; done
          done
          echo "✓ 清理完成"

      - name: Commit & Push
        uses: github-actions-x/commit@v2.9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Auto update: $(date +'%Y-%m-%d %H:%M')"
          files: output/ filtered/
          force-push: true
          branch: main
